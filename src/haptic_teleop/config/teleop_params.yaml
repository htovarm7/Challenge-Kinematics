# haptic_teleop/config/teleop_params.yaml
# Jose Luis Dominguez – ITESM TE3001B
# Approach: posición directa al lite6_traj_controller (sin MoveIt Servo)

bilateral_teleop:
  ros__parameters:
    traj_time_ms:      60       # duración de cada trayectoria [ms] — aumentar si hay saltos
    still_thr_deg:     0.10     # umbral para detectar maestro quieto [grados]
    still_cycles:      3        # ciclos quieto antes de frenar (3 × 20ms = 60ms)
    force_threshold:   3900     # ADC contacto
    force_hysteresis:  3950     # ADC liberación
    calib_samples:     80       # muestras de calibración
    watchdog_timeout:  0.5      # seg sin sensor → EMERGENCY
    torque_gain:       0.15     # ganancia haptic feedback

force_stop_node:
  ros__parameters:
    force_threshold:   3900

collision_feedback_node:
  ros__parameters:
    effort_threshold:      3.0    # umbral de esfuerzo para detectar colision [N*m]
    calib_samples:         100    # muestras para calibrar baseline de esfuerzos
    collision_samples:     3      # muestras consecutivas para confirmar colision
    reflection_gain:       0.5    # ganancia de reflexion de fuerzas al maestro
    max_reflection_torque: 2.0    # torque maximo reflejado [N*m]
    traj_time_ms:          60     # duracion de trayectoria de hold [ms]
    release_factor:        0.5    # factor del umbral para liberar colision (0.5 = 50%)

master_teleop:
  ros__parameters:
    torque_scale:      1.0